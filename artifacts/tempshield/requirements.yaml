packages:
  "framer-motion": "For stunning page transitions, micro-interactions, and glassmorphism entrance animations"
  "recharts": "For the API usage analytics charts in the dashboard"
  "lucide-react": "Beautiful, consistent iconography"
  "clsx": "Utility for constructing className strings conditionally"
  "tailwind-merge": "Utility to efficiently merge Tailwind CSS classes"
  "date-fns": "For formatting usage history dates nicely"

images:
  - path: "artifacts/tempshield/public/images/hero-bg.png"
    description: "Dark, abstract 3D gradient mesh with deep indigo, violet, and black tones. Very subtle, premium glassmorphism feel, suited for a developer SaaS background."
    aspect_ratio: "16:9"
  - path: "artifacts/tempshield/public/images/security-abstract.png"
    description: "Abstract 3D representation of a shield or lock glowing with purple and blue neon lights over a dark metallic surface."
    aspect_ratio: "1:1"

notes:
  - "The app uses session cookies for auth, so credentials: 'include' is required on all fetches."
  - "API hooks are imported from @workspace/api-client-react."
  - "Using Framer Motion extensively for a premium developer-focused SaaS aesthetic."
